name: Deploy to Firebase Hosting (Dev)

on:
  push:
    branches:
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'avalia-monorepo/package-lock.json'

      - name: Install dependencies
        working-directory: ./avalia-monorepo
        run: npm ci

      - name: Apply canary assets (dev icons)
        working-directory: ./avalia-monorepo
        run: node scripts/apply-canary-assets.js

      - name: Setup environment variables (avalia-quiz)
        run: |
          cat > ./avalia-monorepo/apps/avalia-quiz/.env << EOF
          VITE_APP_NAME=Avalia Quiz Canary
          VITE_STORAGE_PREFIX=generic-quiz
          VITE_APP_TITLE=Avalia Quiz Canary
          VITE_THEME=generic-theme
          VITE_PROMPT_PROFILE=generic
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          EOF

      - name: Setup environment variables (avalia-jw-quiz)
        run: |
          cat > ./avalia-monorepo/apps/avalia-jw-quiz/.env << EOF
          VITE_APP_NAME=Avalia JW Quiz Canary
          VITE_STORAGE_PREFIX=jw-quiz
          VITE_APP_TITLE=Avalia JW Quiz Canary
          VITE_THEME=jw-theme
          VITE_PROMPT_PROFILE=jw
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          EOF

      - name: Build all apps
        working-directory: ./avalia-monorepo
        run: npm run build

      - name: Deploy to Firebase Hosting (Dev Sites)
        working-directory: ./avalia-monorepo
        run: |
          npm install -g firebase-tools
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "ERROR: FIREBASE_TOKEN is not set"
            exit 1
          fi
          firebase deploy --only hosting:avaliaquizdev,hosting:avaliajwquizdev --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
