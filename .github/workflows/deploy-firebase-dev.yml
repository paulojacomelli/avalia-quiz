name: Deploy to Firebase Hosting (Dev)

on:
  push:
    branches:
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'avalia-monorepo/package-lock.json'

      - name: Install dependencies
        working-directory: ./avalia-monorepo
        run: npm ci

      - name: Setup environment variables (avalia-quiz)
        run: |
          cat > ./avalia-monorepo/apps/avalia-quiz/.env << EOF
          VITE_APP_NAME=Geral Quiz
          VITE_STORAGE_PREFIX=generic-quiz
          VITE_APP_TITLE=Avalia Quiz
          VITE_THEME=generic-theme
          VITE_PROMPT_PROFILE=generic
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          EOF

      - name: Setup environment variables (avalia-jw-quiz)
        run: |
          cat > ./avalia-monorepo/apps/avalia-jw-quiz/.env << EOF
          VITE_APP_NAME=JW Quiz
          VITE_STORAGE_PREFIX=jw-quiz
          VITE_APP_TITLE=Avalia JW Quiz
          VITE_THEME=jw-theme
          VITE_PROMPT_PROFILE=jw
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          EOF

      - name: Build all apps
        working-directory: ./avalia-monorepo
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting (Dev Sites)
        working-directory: ./avalia-monorepo
        run: |
          if [ -z "${{ secrets.FIREBASE_DEPLOY_TOKEN }}" ]; then
            echo "Using Service Account Key method"
            echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}" > serviceAccountKey.json
            export GOOGLE_APPLICATION_CREDENTIALS=serviceAccountKey.json
            firebase deploy --only hosting:avaliaquizdev,hosting:avaliajwquizdev --non-interactive
          else
            echo "Using Firebase Deploy Token method"
            firebase deploy --token "${{ secrets.FIREBASE_DEPLOY_TOKEN }}" --only hosting:avaliaquizdev,hosting:avaliajwquizdev --non-interactive
          fi
